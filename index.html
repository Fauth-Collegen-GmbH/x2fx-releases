<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>X2FX Releases</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f1ea;
      --panel: #fffaf2;
      --text: #1f2421;
      --muted: #5f6b66;
      --line: #d7ccba;
      --accent: #0a6c74;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at top left, rgba(10, 108, 116, 0.15), transparent 30%),
        linear-gradient(180deg, var(--bg), #efe6d7);
      color: var(--text);
    }
    main {
      max-width: 760px;
      margin: 48px auto;
      padding: 24px;
    }
    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 18px 40px rgba(31, 36, 33, 0.08);
    }
    h1 {
      margin-top: 0;
      margin-bottom: 8px;
      font-size: 2.2rem;
    }
    p {
      margin: 0 0 16px;
      line-height: 1.5;
    }
    dl {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 10px 16px;
      margin: 24px 0;
    }
    dt {
      color: var(--muted);
      font-weight: bold;
    }
    dd {
      margin: 0;
    }
    a {
      color: var(--accent);
    }
  </style>
</head>
<body>
  <main>
    <section>
      <h1>X2FX Releases</h1>
      <p>Static release feed for self-hosted Chrome extension updates.</p>
      <dl>
        <dt>Current version</dt>
        <dd>4.1.4</dd>
        <dt>Published at</dt>
        <dd>2026-03-13T14:41:37Z</dd>
        <dt>Update manifest</dt>
        <dd><a href="x2fx_manifest.xml">x2fx_manifest.xml</a></dd>
        <dt>Latest CRX</dt>
        <dd><a href="x2fx.crx">x2fx.crx</a></dd>
        <dt>Versioned CRX</dt>
        <dd><a href="X2FX-4.1.4.crx">X2FX-4.1.4.crx</a></dd>
        <dt>Release metadata</dt>
        <dd><a href="latest.json">latest.json</a></dd>
      </dl>
    </section>
  </main>
</body>
</html>
